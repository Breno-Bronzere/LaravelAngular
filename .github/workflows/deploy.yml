name: Testar e Deploy InfinityFree

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: atividade_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo, pdo_mysql, mysql
          coverage: xdebug

      - name: Copiar .env de exemplo
        run: cp laravel/.env.example laravel/.env.testing

      - name: Configurar variáveis de ambiente para teste
        run: |
          cd laravel
          sed -i 's/APP_ENV=.*/APP_ENV=testing/' .env.testing
          sed -i 's/APP_DEBUG=.*/APP_DEBUG=true/' .env.testing
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env.testing
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env.testing
          sed -i 's/DB_PORT=.*/DB_PORT=3306/' .env.testing
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=atividade_test/' .env.testing
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env.testing
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=root/' .env.testing

      - name: Instalar dependências Composer
        run: |
          cd laravel
          composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Gerar chave da aplicação
        run: |
          cd laravel
          php artisan key:generate --env=testing

      - name: Rodar migrations no banco de teste
        run: |
          cd laravel
          php artisan migrate --env=testing --force

      - name: Desativar rate limit para testes
        run: |
          cd laravel
          sed -i 's/RateLimiter::for(.api., function (Request \$request) {/RateLimiter::for("api", function (Request $request) {\n            return Limit::none(); \/\/ desativado em CI/' app/Providers/RouteServiceProvider.php || true

      - name: Rodar os testes
        run: |
          cd laravel
          php artisan test --env=testing

  deploy:
    name: Deploy via FTP para InfinityFree
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar dependências Composer (produção)
        run: |
          cd laravel
          composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Configurar .env de produção
        run: |
          cd laravel
          cp .env.example .env
          sed -i 's/APP_ENV=.*/APP_ENV=production/' .env
          sed -i 's/APP_DEBUG=.*/APP_DEBUG=false/' .env

      - name: Gerar chave da aplicação
        run: |
          cd laravel
          php artisan key:generate --force

      - name: Enviar arquivos via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./laravel/
          server-dir: ${{ secrets.FTP_DIR }}/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/.env.testing
            **/storage/logs/*